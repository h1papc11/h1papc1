<!DOCTYPE html>
<html lang="tr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Vendor E-Ticaret</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">PazarYeri</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Ana Sayfa</a>
                    </li>
                </ul>
                
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3">
                        <button id="theme-toggle" class="btn btn-outline-secondary btn-sm">🌙 Koyu Tema</button>
                    </li>
                    
                    {% if request.user.is_authenticated %}
                        <li class="nav-item"><span class="nav-link">Hoş geldin, <b>{{ request.user.username }}</b></span></li>
                        <li class="nav-item"><a class="nav-link text-success fw-bold" href="{% url 'cart_view' %}">🛒 Sepetim</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'inbox' %}">✉️ Mesajlar</a></li>
                        <li class="nav-item"><a class="btn btn-danger btn-sm ms-2" href="{% url 'logout' %}">Çıkış Yap</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Giriş Yap</a></li>
                        <li class="nav-item"><a class="btn btn-primary btn-sm ms-2" href="{% url 'register' %}">Kayıt Ol</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        
        // Hafızadaki temayı kontrol et
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            htmlElement.setAttribute('data-bs-theme', 'dark');
            themeToggleBtn.innerText = '☀️ Açık Tema';
        }

        themeToggleBtn.addEventListener('click', () => {
            let theme = htmlElement.getAttribute('data-bs-theme');
            if (theme === 'dark') {
                htmlElement.setAttribute('data-bs-theme', 'light');
                localStorage.setItem('theme', 'light');
                themeToggleBtn.innerText = '🌙 Koyu Tema';
                themeToggleBtn.classList.replace('btn-outline-light', 'btn-outline-secondary');
            } else {
                htmlElement.setAttribute('data-bs-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggleBtn.innerText = '☀️ Açık Tema';
                themeToggleBtn.classList.replace('btn-outline-secondary', 'btn-outline-light');
            }
        });
    </script>
</body>
</html>
