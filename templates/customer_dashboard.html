{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 text-center mb-5">
    <h2 class="fw-bold mb-4">Hoş Geldiniz, {{ request.user.username }}!</h2>
    <p class="lead text-muted mb-5">Müşteri panelinizden sepetinize ulaşabilir veya satıcılarla olan görüşmelerinize devam edebilirsiniz.</p>

    <div class="row justify-content-center gap-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 bg-body-tertiary p-4 transition-hover">
                <h1 class="display-3 mb-3">🛒</h1>
                <h4 class="fw-bold">Alışveriş Sepetim</h4>
                <a href="{% url 'cart_view' %}" class="btn btn-primary btn-lg mt-3 fw-bold">Sepete Git</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0 bg-body-tertiary p-4 transition-hover">
                <h1 class="display-3 mb-3">✉️</h1>
                <h4 class="fw-bold">Mesajlarım</h4>
                <a href="{% url 'inbox' %}" class="btn btn-info text-white btn-lg mt-3 fw-bold">Kutuyu Aç</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
