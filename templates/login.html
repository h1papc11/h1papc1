{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 fw-bold">Giriş Yap</h3>
                
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Giriş Yap</button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    <span class="text-muted">Hesabınız yok mu?</span> 
                    <a href="{% url 'register' %}" class="text-decoration-none fw-bold">Hemen Kayıt Olun</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
